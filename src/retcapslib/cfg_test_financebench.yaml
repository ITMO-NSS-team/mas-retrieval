experiment:
  seed: 42

benchmarks:
  financebench:
    sample_n: 10
    collection_name: "financebench"

models:
  primary: "openai/gpt-4o-mini"

retriever:
  embedder: "BAAI/bge-m3"
  reranker: "BAAI/bge-reranker-v2-m3"
  retrieve_top_k: 20
  rerank_top_k: 10
  index_path: "experiments/data/chroma_index/"

execution:
  timeout_per_question_s: 300
  max_tool_calls: 20
  max_retries_on_error: 1

systems:
  - naive_rag
  - single_agent
  # - swarm_agentic
  # - cg_mas

output:
  results_dir: "results/"
