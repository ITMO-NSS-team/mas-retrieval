experiment:
  seed: 42

benchmarks:
  hotpotqa:
    split: "fullwiki_dev"
    sample_n: 500
    stratify_by: "type" # bridge / comparison, 250 each
    collection_name: "hotpotqa"
  financebench:
    sample_n: 150
    collection_name: "financebench"

models:
  primary: "gpt-4o-mini"
  cross_model:
    - "meta-llama/llama-3.3-70b-instruct"
    - "qwen/qwen3-235b-a22b"

retriever:
  embedder: "BAAI/bge-m3"
  reranker: "BAAI/bge-reranker-v2-m3"
  retrieve_top_k: 20
  rerank_top_k: 10
  index_path: "experiments/data/chroma_index/"

systems:
  - naive_rag
  - single_agent
  - swarm_agentic
  - cg_mas

output:
  results_dir: "results/"
