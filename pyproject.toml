[build-system]
requires = ["uv_build>=0.9.30,<0.10.0"]
build-backend = "uv_build"

[project]
name = "marlib"
version = "0.1.0"
description = "Evaluating Auto-Generated Multi-Agent Systems on QA & RAG Tasks"
readme = "README.md"
requires-python = ">=3.12"

dependencies = [
    "fastmcp>=2.14.5",
    "transformers<5",
    "torch>=2.10.0",
    "chromadb>=1.4.1",
    "numpy>=2.4.2",
    "FlagEmbedding>=1.3.0",
    "pydantic>=2.12.5",
    "pydantic-settings>=2.14.0",
    "pydantic-ai>=1.56.0",
    "logly>=0.1.6",
    "tqdm>=4.67.3",
    "pydantic-monty>=0.0.18",
    "genai-prices>=0.0.62",
    "rich>=15.0.0",
]

[project.scripts]
download-benchmarks = "marlib.data.download_benchmarks:main"
prepare-corpus = "marlib.data.prepare_corpus:main"
import-answers = "marlib.data.import_answers:main"
build-index = "marlib.retriever.index_builder:main"
build-lightrag-index = "marlib.retriever.lightrag_index_builder:main"
bench = "marlib.cli:main"


[dependency-groups]
dev = ["pytest>=8.4.0"]
benchmarks = ["datasets>=4.5.0", "pymupdf>=1.25.0"]
ma_rag = ["pydantic-graph>=1.56.0"]
swarm_agentic = ["langchain-openai>=0.3.0", "langchain-core>=0.3.0"]
naive_rag = ["openai>=2.16.0", "python-dotenv>=1.0.0"]
api_embedder = ["openai>=2.16.0"]
meta_agent = ["openai>=2.16.0"]
adas = ["openai>=2.16.0", "backoff>=2.2.0"]
mas_zero = ["openai>=2.16.0", "backoff>=2.2.0"]
lightrag = ["lightrag-hku>=1.4.16"]

# fedotmas / automas: install from local source
#   uv pip install -e automas-research/

[tool.uv]
# Keep the OpenTelemetry stack internally consistent. chromadb pulls the OTLP
# exporter and pydantic-ai needs opentelemetry-sdk>=1.39 (<1.42), but api and
# sdk ship in lockstep, so a mix (api 1.38 from automas' old `<1.39` cap + sdk
# 1.41 from the exporter) breaks `import chromadb` (ImportError:
# ReadableLogRecord). Pin the whole stack to the 1.39–1.41 window so api / sdk /
# exporter stay aligned. (automas' pyproject cap was relaxed to match.)
# Constraints only bound versions of deps that are already required.
constraint-dependencies = [
    "opentelemetry-api>=1.39,<1.42",
    "opentelemetry-sdk>=1.39,<1.42",
    "opentelemetry-exporter-otlp-proto-grpc>=1.39,<1.42",
    "opentelemetry-exporter-otlp-proto-common>=1.39,<1.42",
    "opentelemetry-exporter-otlp-proto-http>=1.39,<1.42",
    "opentelemetry-proto>=1.39,<1.42",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
