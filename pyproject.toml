[build-system]
requires = ["uv_build>=0.9.30,<0.10.0"]
build-backend = "uv_build"

[project]
name = "retcapslib"
version = "0.1.0"
description = "Evaluating Auto-Generated Multi-Agent Systems on Retrieval Tasks"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "fastmcp>=2.14.5",
    "transformers<5",
    "torch>=2.10.0",
    "peft>=0.18.1",
    "torchvision>=0.25.0",
    "pillow>=12.1.0",
    "chromadb>=1.4.1",
    "datasets>=4.5.0",
    "pyyaml>=6.0.3",
    "tqdm>=4.67.3",
    "numpy>=2.4.2",
    "pydantic>=2.12.5",
    "openai>=2.16.0",
    "FlagEmbedding>=1.3.0",
    "pydotenv>=0.0.7",
    "pydantic-ai>=1.56.0",
    "pydantic-evals>=1.56.0",
    "pymupdf>=1.25.0",
]

[project.scripts]
download-benchmarks = "retcapslib.data.download_benchmarks:main"
prepare-corpus = "retcapslib.data.prepare_corpus:main"
build-index = "retcapslib.retriever.index_builder:main"
run-experiment = "retcapslib.runners.run_experiment:main"

[dependency-groups]
swarm = [
    "langchain-openai>=0.3.0",
    "langchain-core>=0.3.0",
]
## automas: install separately from local source:
##   uv pip install -e automas-research/
