[build-system]
requires = ["uv_build>=0.9.30,<0.10.0"]
build-backend = "uv_build"

[project]
name = "marlib"
version = "0.1.0"
description = "Evaluating Auto-Generated Multi-Agent Systems on QA & RAG Tasks"
readme = "README.md"
requires-python = ">=3.12"

dependencies = [
    "fastmcp>=2.14.5",
    "transformers<5",
    "torch>=2.10.0",
    "chromadb>=1.4.1",
    "numpy>=2.4.2",
    "FlagEmbedding>=1.3.0",
    "pydantic>=2.12.5",
    "pydantic-ai>=1.56.0",
    "logly>=0.1.6",
    "tqdm>=4.67.3",
]

[project.scripts]
download-benchmarks = "marlib.data.download_benchmarks:main"
prepare-corpus = "marlib.data.prepare_corpus:main"
build-index = "marlib.retriever.index_builder:main"
bench = "marlib.cli:main"


[dependency-groups]
benchmarks = ["datasets>=4.5.0", "pymupdf>=1.25.0"]
ma_rag = ["pydantic-graph>=1.56.0"]
swarm_agentic = ["langchain-openai>=0.3.0", "langchain-core>=0.3.0"]
naive_rag = ["openai>=2.16.0", "python-dotenv>=1.0.0"]
meta_agent = ["openai>=2.16.0"]
mas_zero = ["openai>=2.16.0", "backoff>=2.2.0"]

# fedotmas / automas: install from local source
#   uv pip install -e automas-research/
